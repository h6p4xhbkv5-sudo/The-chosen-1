<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Lessons — Synaptiq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false},{left:'$',right:'$',display:false}],throwOnError:false})"></script>
<style>
:root {
  --black:#0A0C12; --bg2:#12141C; --bg3:#1A1D28; --bg4:#22263A;
  --gold:#C9A84C; --white:#F0EEF8; --muted:#8B899C; --border:rgba(255,255,255,0.08);
  --blue:#60A5FA; --green:#4ADE80; --purple:#A78BFA; --pink:#F472B6; --orange:#FB923C;
  --font:'DM Sans',sans-serif; --font-mono:'Space Mono',monospace;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:var(--font);min-height:100vh}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,12,18,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-brand{display:flex;align-items:center;gap:.75rem;font-weight:700;font-size:1.1rem;text-decoration:none;color:var(--white)}
.nav-brand span{color:var(--gold)}
.nav-back{display:inline-flex;align-items:center;gap:.5rem;color:var(--muted);font-size:.875rem;text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--white)}
.nav-actions{display:flex;align-items:center;gap:.75rem}

/* LAYOUT */
.page{max-width:1000px;margin:0 auto;padding:2rem 1.5rem}
.page-header{margin-bottom:2rem}
.page-title{font-size:1.8rem;font-weight:700;margin-bottom:.4rem}
.page-sub{color:var(--muted);font-size:.95rem}

/* SELECTOR */
.selector-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.selector-card h3{font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:1rem}
.selector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem;margin-bottom:1rem}
@media(max-width:600px){.selector-grid{grid-template-columns:1fr 1fr}}
.form-group{display:flex;flex-direction:column;gap:.3rem}
.form-group label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-group select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--white);padding:.6rem .875rem;font-size:.875rem;font-family:var(--font);width:100%;outline:none;transition:border-color .2s}
.form-group select:focus{border-color:rgba(201,168,76,0.5)}
.form-group select option{background:var(--bg3)}
.topics-list{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.topic-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:.35rem .875rem;font-size:.8rem;cursor:pointer;transition:all .2s;color:var(--muted)}
.topic-pill:hover{border-color:rgba(201,168,76,0.5);color:var(--white)}
.topic-pill.selected{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);font-weight:600}
.topic-subtopics{display:none;margin-top:.5rem}
.topic-subtopics.show{display:flex;flex-wrap:wrap;gap:.4rem;padding:.5rem 0}
.subtopic-pill{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:20px;padding:.25rem .65rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .2s}
.subtopic-pill:hover,.subtopic-pill.selected{background:rgba(201,168,76,0.2);color:var(--white);border-color:rgba(201,168,76,0.5)}

/* GRADE TARGET */
.grade-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.grade-row label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.grade-pills{display:flex;gap:.4rem;flex-wrap:wrap}
.grade-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted)}
.grade-pill:hover{color:var(--white)}
.grade-pill.selected-astar{background:rgba(201,168,76,0.2);border-color:var(--gold);color:var(--gold)}
.grade-pill.selected-a{background:rgba(96,165,250,0.15);border-color:var(--blue);color:var(--blue)}
.grade-pill.selected-b{background:rgba(74,222,128,0.12);border-color:var(--green);color:var(--green)}
.grade-pill.selected-c{background:rgba(167,139,250,0.12);border-color:var(--purple);color:var(--purple)}

/* LESSON MODES */
.lesson-modes{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.mode-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:.4rem}
.mode-btn.selected{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.4);color:var(--gold)}
.mode-btn:hover{color:var(--white)}

/* START BUTTON */
.btn-gold{background:var(--gold);color:var(--black);border:none;border-radius:var(--radius);padding:.875rem 2rem;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .2s}
.btn-gold:hover{opacity:.85}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:.6rem 1rem;color:var(--white);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:rgba(201,168,76,0.4);color:var(--gold)}

/* LESSON OUTPUT */
.lesson-output{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;display:none}
.lesson-output.show{display:block}
.lesson-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.lesson-title{font-size:1.4rem;font-weight:700;margin-bottom:.3rem}
.lesson-meta{font-size:.8rem;color:var(--muted)}
.lesson-body{font-size:.9rem;line-height:1.9;color:rgba(240,238,248,0.9)}
.lesson-body p{margin-bottom:.75rem}
.lesson-body ul,.lesson-body ol{padding-left:1.5rem;margin-bottom:.75rem}
.lesson-body li{margin-bottom:.4rem}
.lesson-body strong{color:var(--gold)}
.lesson-body code{font-family:var(--font-mono);background:var(--bg3);padding:.15rem .4rem;border-radius:4px;font-size:.85em}
.lesson-body .callout{background:rgba(201,168,76,0.07);border-left:3px solid var(--gold);padding:.75rem 1rem;border-radius:0 8px 8px 0;margin:.75rem 0}
.lesson-body .example{background:rgba(96,165,250,0.07);border-left:3px solid var(--blue);padding:.75rem 1rem;border-radius:0 8px 8px 0;margin:.75rem 0}
.lesson-body .warning{background:rgba(244,114,182,0.07);border-left:3px solid var(--pink);padding:.75rem 1rem;border-radius:0 8px 8px 0;margin:.75rem 0}

/* ESSENTIAL / BONUS CONTENT */
.lesson-body .essential-block{background:rgba(201,168,76,0.08);border:1.5px solid rgba(201,168,76,0.35);border-radius:10px;padding:1rem 1.1rem;margin:.9rem 0;position:relative}
.essential-tag{display:inline-flex;align-items:center;gap:.35rem;background:var(--gold);color:var(--black);font-size:.68rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .55rem;border-radius:20px;margin-bottom:.5rem}
.lesson-body .bonus-block{background:rgba(139,137,156,0.06);border:1px solid rgba(139,137,156,0.18);border-radius:10px;padding:.8rem 1rem;margin:.75rem 0;position:relative}
.bonus-tag{display:inline-flex;align-items:center;gap:.35rem;background:rgba(139,137,156,0.2);color:var(--muted);font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .55rem;border-radius:20px;margin-bottom:.4rem}

/* ── SLIDE DECK ── */
.slide-deck{position:relative}
.slide-track{overflow:hidden;border-radius:var(--radius)}
.slide{display:none;animation:slideIn .3s ease}
.slide.active{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.slide-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:2rem 2.2rem;min-height:320px}
.slide-step-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.slide-step-num{width:26px;height:26px;border-radius:50%;background:var(--gold);color:var(--black);font-size:.75rem;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.slide-title{font-size:1.25rem;font-weight:700;margin-bottom:1.1rem;color:var(--white)}
.slide-content{font-size:.9rem;line-height:1.9;color:rgba(240,238,248,0.9)}
.slide-content p{margin-bottom:.7rem}
.slide-content ul,.slide-content ol{padding-left:1.4rem;margin-bottom:.7rem}
.slide-content li{margin-bottom:.35rem}
.slide-content strong{color:var(--gold)}
.slide-content code{font-family:var(--font-mono);background:var(--bg4);padding:.15rem .4rem;border-radius:4px;font-size:.85em}
.slide-content .callout{background:rgba(201,168,76,0.07);border-left:3px solid var(--gold);padding:.7rem .9rem;border-radius:0 8px 8px 0;margin:.7rem 0}
.slide-content .example{background:rgba(96,165,250,0.07);border-left:3px solid var(--blue);padding:.7rem .9rem;border-radius:0 8px 8px 0;margin:.7rem 0}
.slide-content .warning{background:rgba(244,114,182,0.07);border-left:3px solid var(--pink);padding:.7rem .9rem;border-radius:0 8px 8px 0;margin:.7rem 0}
.slide-keypint{margin-top:1.4rem;background:rgba(201,168,76,0.1);border:1.5px solid rgba(201,168,76,0.4);border-radius:10px;padding:1rem 1.2rem;font-size:.92rem;color:var(--white);line-height:1.7}
.slide-keypint::before{content:"✦ Key Point";color:var(--gold);font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.35rem}
.slide-essential-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(201,168,76,0.18);border:1px solid rgba(201,168,76,0.4);color:var(--gold);font-size:.72rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;margin-bottom:.6rem;letter-spacing:.04em}
.slide-bonus-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(139,137,156,0.12);border:1px solid rgba(139,137,156,0.25);color:var(--muted);font-size:.72rem;font-weight:600;padding:.2rem .6rem;border-radius:20px;margin-bottom:.6rem}

.slide-nav{display:flex;align-items:center;gap:1rem;margin-top:1.5rem;justify-content:space-between;flex-wrap:wrap}
.slide-nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.65rem 1.3rem;color:var(--white);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.5rem}
.slide-nav-btn:hover:not(:disabled){border-color:rgba(201,168,76,0.4);color:var(--gold)}
.slide-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.slide-counter{font-size:.8rem;color:var(--muted);font-weight:600}
.slide-progress-dots{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;max-width:320px}
.slide-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.slide-dot.active{background:var(--gold);border-color:var(--gold);transform:scale(1.2)}
.slide-dot.visited{background:rgba(201,168,76,0.35);border-color:rgba(201,168,76,0.35)}

/* grade indicator in slide */
.grade-indicator{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;letter-spacing:.04em}
.grade-astar{background:rgba(201,168,76,0.18);color:var(--gold)}
.grade-a{background:rgba(96,165,250,0.14);color:var(--blue)}
.grade-b{background:rgba(74,222,128,0.12);color:var(--green)}
.grade-c{background:rgba(167,139,250,0.12);color:var(--purple)}

/* QUIZ in lesson */
.lesson-quiz{background:var(--bg3);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
.quiz-q{font-size:.9rem;font-weight:600;margin-bottom:.75rem}
.quiz-options{display:flex;flex-direction:column;gap:.4rem}
.quiz-opt{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:.6rem .875rem;font-size:.85rem;cursor:pointer;transition:all .2s;text-align:left;color:var(--white)}
.quiz-opt:hover{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.quiz-opt.correct{background:rgba(74,222,128,0.15);border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:rgba(244,114,182,0.1);border-color:var(--pink);color:var(--pink)}
.quiz-feedback{font-size:.8rem;margin-top:.5rem;display:none}
.quiz-feedback.show{display:block}

/* DOT PULSE */
.loading-msg{display:flex;align-items:center;gap:.75rem;color:var(--muted);padding:2rem;font-size:.9rem}
.dot-pulse{display:inline-flex;gap:4px}
.dot-pulse span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:dp .8s infinite alternate}
.dot-pulse span:nth-child(2){animation-delay:.2s}
.dot-pulse span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%{opacity:.3;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(2rem);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1.5rem;font-size:.875rem;z-index:1000;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* AUTH OVERLAY */
#auth-overlay{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
</style>
</head>
<body>

<div id="auth-overlay">
  <div style="font-size:2rem;color:var(--gold)">✦</div>
  <div style="font-weight:700;font-size:1.1rem">Synaptiq</div>
  <div style="color:var(--muted);font-size:.875rem">Loading your lessons...</div>
</div>

<nav class="nav">
  <a class="nav-brand" href="/"><span>✦</span> Synaptiq</a>
  <a class="nav-back" href="/">← Back to Dashboard</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1 class="page-title">🎓 AI Lessons from the Curriculum</h1>
    <p class="page-sub">Select a topic, your target grade, and lesson type — Synaptiq AI generates a focused, grade-targeted lesson</p>
  </div>

  <!-- SELECTOR -->
  <div class="selector-card" id="selector-card">
    <h3>✦ Choose Your Lesson</h3>
    <div class="selector-grid">
      <div class="form-group">
        <label>Level</label>
        <select id="l-level" onchange="updateSubjects()">
          <option value="alevel" selected>A-Level</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <select id="l-subject" onchange="updateTopics()"></select>
      </div>
      <div class="form-group">
        <label>Exam Board</label>
        <select id="l-board">
          <option>AQA</option><option>Edexcel</option><option>OCR</option>
          <option>MEI</option><option>WJEC</option>
        </select>
      </div>
    </div>

    <!-- TARGET GRADE -->
    <div class="grade-row">
      <label>Target Grade</label>
      <div class="grade-pills" id="grade-pills">
        <button class="grade-pill selected-astar" data-grade="A*" onclick="selectGrade(this)">A*</button>
        <button class="grade-pill" data-grade="A" onclick="selectGrade(this)">A</button>
        <button class="grade-pill" data-grade="B" onclick="selectGrade(this)">B</button>
        <button class="grade-pill" data-grade="C" onclick="selectGrade(this)">C</button>
      </div>
      <span id="grade-hint" style="font-size:.75rem;color:var(--muted);margin-left:.25rem">All content shown</span>
    </div>

    <div style="margin-bottom:1rem">
      <div style="font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Select Topic</div>
      <div class="topics-list" id="topics-list"></div>
      <div class="topic-subtopics" id="subtopics-area"></div>
    </div>

    <div style="margin-bottom:1rem">
      <div style="font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Lesson Type</div>
      <div class="lesson-modes">
        <button class="mode-btn selected" data-mode="full" onclick="selectMode(this)">📖 Full Lesson</button>
        <button class="mode-btn" data-mode="slides" onclick="selectMode(this)">🎞️ Step-by-Step Slides</button>
        <button class="mode-btn" data-mode="explain" onclick="selectMode(this)">💡 Explanation Only</button>
        <button class="mode-btn" data-mode="examples" onclick="selectMode(this)">✏️ Worked Examples</button>
        <button class="mode-btn" data-mode="quiz" onclick="selectMode(this)">🧠 Interactive Quiz</button>
        <button class="mode-btn" data-mode="exam" onclick="selectMode(this)">🎯 Exam Technique</button>
        <button class="mode-btn" data-mode="revision" onclick="selectMode(this)">⚡ Quick Revision</button>
      </div>
    </div>

    <button class="btn-gold" id="start-btn" onclick="startLesson()" disabled>✦ Start Lesson</button>
  </div>

  <!-- LESSON OUTPUT -->
  <div class="lesson-output" id="lesson-output"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ─── Curriculum Data ───────────────────────────────────
const CURRICULUM = {
  alevel: {
    Mathematics: { boards:['AQA','Edexcel','OCR','MEI'], topics:{
      'Pure — Algebra':['Proof & surds','Quadratics & polynomials','Binomial expansion','Partial fractions','Parametric equations'],
      'Pure — Calculus':['Differentiation rules (chain, product, quotient)','Integration (by parts, substitution)','Differential equations'],
      'Pure — Trigonometry':['Radians & sector','Compound & double angle formulae','Solving trig equations'],
      'Pure — Exponentials & Logs':['e^x & ln(x)','Laws of logarithms','Exponential growth & decay'],
      'Pure — Vectors':['3D vectors','Dot product','Lines & planes'],
      'Statistics':['Binomial & normal distributions','Hypothesis testing','Regression & correlation'],
      'Mechanics':['SUVAT in 2D','Forces & Newton\'s laws','Moments & equilibrium','Projectiles','Work, energy & power']
    }}
  }
};

// Grade config
const GRADE_CONFIG = {
  'A*': { hint:'All content shown', cls:'selected-astar', label:'A* — Full Depth', depth:'every concept including edge cases, proofs, and advanced techniques' },
  'A':  { hint:'Core + key extensions', cls:'selected-a', label:'A — Core + Extensions', depth:'all core content plus key extension techniques needed for top marks' },
  'B':  { hint:'Core content only', cls:'selected-b', label:'B — Core Content', depth:'only the essential core content and standard methods' },
  'C':  { hint:'Must-know basics only', cls:'selected-c', label:'C — Essentials Only', depth:'only the minimum required content — the must-know basics to secure the grade' }
};

// ─── State ─────────────────────────────────────────────
const SUPABASE_URL = window.SUPABASE_URL || '';
const SUPABASE_ANON = window.SUPABASE_ANON_KEY || '';
let supabaseClient = null;
let currentUser = null;
let selectedTopic = null;
let selectedSubtopic = null;
let selectedMode = 'full';
let selectedGrade = 'A*';
let slideData = [];
let currentSlide = 0;
let visitedSlides = new Set();

// ─── Auth ──────────────────────────────────────────────
async function initAuth() {
  if (SUPABASE_URL && SUPABASE_ANON && window.supabase) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { currentUser = { token: session.access_token, ...session.user }; }
  }
  if (!currentUser) {
    try {
      const token = localStorage.getItem('synaptiq_token');
      if (token) currentUser = { token };
      else {
        const saved = localStorage.getItem('synaptiq_user');
        if (saved) currentUser = JSON.parse(saved);
      }
    } catch(e) {}
  }
  const overlay = document.getElementById('auth-overlay');
  if (!currentUser) { window.location.href = '/'; return; }
  overlay.remove();
  updateSubjects();
}

async function callClaude(messages, system) {
  const body = { max_tokens:4000, messages };
  if (system) body.system = system;
  const headers = { 'Content-Type':'application/json' };
  if (currentUser?.token) headers['Authorization'] = 'Bearer ' + currentUser.token;
  const r = await fetch('/api/chat', { method:'POST', headers, body:JSON.stringify(body) });
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('Bad response (' + r.status + ')'); }
  if (!r.ok) throw new Error(data.error || 'API error ' + r.status);
  if (data.error) throw new Error(data.error.message || 'Anthropic error');
  return data;
}
function getReply(d) { return d.content && d.content[0] ? d.content[0].text : ''; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Grade Selection ────────────────────────────────────
function selectGrade(btn) {
  document.querySelectorAll('.grade-pill').forEach(b => {
    b.className = 'grade-pill';
  });
  selectedGrade = btn.dataset.grade;
  const cfg = GRADE_CONFIG[selectedGrade];
  btn.classList.add(cfg.cls);
  document.getElementById('grade-hint').textContent = cfg.hint;
}

// ─── UI helpers ────────────────────────────────────────
function updateSubjects() {
  const level = document.getElementById('l-level').value;
  const subjectSel = document.getElementById('l-subject');
  const subjects = Object.keys(CURRICULUM[level] || {});
  subjectSel.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
  updateTopics();
}

function updateTopics() {
  const level = document.getElementById('l-level').value;
  const subject = document.getElementById('l-subject').value;
  const data = CURRICULUM[level]?.[subject];
  const container = document.getElementById('topics-list');
  const subtopicsArea = document.getElementById('subtopics-area');
  selectedTopic = null; selectedSubtopic = null;
  document.getElementById('start-btn').disabled = true;
  subtopicsArea.innerHTML = '';
  subtopicsArea.classList.remove('show');

  if (!data) { container.innerHTML = ''; return; }

  const boardSel = document.getElementById('l-board');
  if (data.boards?.length) {
    boardSel.innerHTML = data.boards.map(b => `<option>${b}</option>`).join('');
  }

  container.innerHTML = Object.keys(data.topics).map(t =>
    `<button class="topic-pill" onclick="selectTopic(this,'${encodeURIComponent(t)}')">${t}</button>`
  ).join('');
}

function selectTopic(btn, topicEnc) {
  const topic = decodeURIComponent(topicEnc);
  const level = document.getElementById('l-level').value;
  const subject = document.getElementById('l-subject').value;
  document.querySelectorAll('.topic-pill').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTopic = topic;
  selectedSubtopic = null;

  const subtopics = CURRICULUM[level]?.[subject]?.topics?.[topic] || [];
  const area = document.getElementById('subtopics-area');
  area.innerHTML = subtopics.map(st =>
    `<button class="subtopic-pill" onclick="selectSubtopic(this,'${encodeURIComponent(st)}')">${st}</button>`
  ).join('');
  area.classList.add('show');
  document.getElementById('start-btn').disabled = false;
}

function selectSubtopic(btn, stEnc) {
  document.querySelectorAll('.subtopic-pill').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSubtopic = decodeURIComponent(stEnc);
}

function selectMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMode = btn.dataset.mode;
}

// ─── Grade-aware system prompt builder ─────────────────
function buildGradeInstruction() {
  const g = selectedGrade;
  if (g === 'A*') return `The student is targeting an A* grade. Include ALL content — core concepts, edge cases, proofs, advanced techniques, and anything that separates A from A*. Mark truly essential items with [ESSENTIAL: ...] and advanced/bonus content with [BONUS: ...].`;
  if (g === 'A')  return `The student is targeting an A grade. Include core content plus key extension techniques. Mark essential items with [ESSENTIAL: ...] and bonus/stretch content with [BONUS: ...]. Omit highly advanced proofs unless they directly appear on the exam.`;
  if (g === 'B')  return `The student is targeting a B grade. Focus ONLY on core content and standard methods. EXCLUDE edge cases, proofs, and advanced extensions. Mark every piece of must-know content with [ESSENTIAL: ...]. Do not include bonus content.`;
  return `The student is targeting a C grade. Include ONLY the bare minimum required to pass — the most fundamental methods and definitions. Every item of content MUST be labelled [ESSENTIAL: ...]. Ruthlessly exclude anything not needed to achieve a C grade.`;
}

// ─── Lesson Generation ─────────────────────────────────
async function startLesson() {
  if (!selectedTopic) { showToast('Please select a topic first'); return; }
  const level = document.getElementById('l-level').value;
  const subject = document.getElementById('l-subject').value;
  const board = document.getElementById('l-board').value;
  const topicFocus = selectedSubtopic || selectedTopic;
  const btn = document.getElementById('start-btn');
  const output = document.getElementById('lesson-output');
  const gradeCfg = GRADE_CONFIG[selectedGrade];

  btn.disabled = true;
  btn.textContent = '✦ Generating lesson...';
  output.className = 'lesson-output show';
  output.innerHTML = `<div class="loading-msg"><div class="dot-pulse"><span></span><span></span><span></span></div>Synaptiq is preparing your ${selectedGrade}-targeted lesson on "${topicFocus}"...</div>`;

  const levelLabel = level === 'alevel' ? 'A-Level' : 'GCSE';
  const gradeInstruction = buildGradeInstruction();

  // Mode-specific prompts
  const modeGuides = {
    full: `Create a COMPLETE interactive lesson with: 1) A clear explanation with examples. 2) Key definitions in bold. 3) Worked examples (show all steps). 4) Common exam mistakes to avoid. 5) 5 practice questions with model answers. 6) Quick summary bullet points. Use [CALLOUT: ...], [EXAMPLE: ...], [WARNING: ...]. ${gradeInstruction}`,
    explain: `Write a thorough, clear explanation of the topic as if teaching it for the first time. Include key definitions, real-world analogies, and step-by-step breakdowns. Use clear headings. ${gradeInstruction}`,
    examples: `Provide 5–7 fully worked examples with every step shown and explained. Start simple, increase to exam standard. Show all working. After each step, explain WHY. ${gradeInstruction}`,
    quiz: `Create an interactive quiz with 8 multiple-choice questions. For each: {"question":"...","options":["A)...","B)...","C)...","D)..."],"correct":0,"explanation":"..."} where correct is 0-indexed. Return ONLY valid JSON array. ${gradeInstruction}`,
    exam: `Provide expert exam technique: 1) Examiner mark scheme language. 2) Common mistakes and how to avoid them. 3) Key phrases and terminology. 4) Extended answer structure. 5) Time tips. 6) A model A-grade answer. ${gradeInstruction}`,
    revision: `Create a condensed revision guide: 1) Key facts in bullet points. 2) Essential formulas in a table. 3) Mnemonics. 4) 3 exam-style questions with brief answers. Keep it concise. ${gradeInstruction}`,
    slides: `You are creating a STEP-BY-STEP SLIDE DECK to teach how to solve problems on this topic (e.g. plotting x,y graphs, finding circle equations, etc.).

Return ONLY a valid JSON array with NO markdown fences, NO extra text. Each element is one slide/step:
[
  {
    "step": 1,
    "title": "Step title (action verb)",
    "content": "HTML explanation using <p>, <ul>, <li>, <strong>, <code> tags. Show the working clearly.",
    "keyPoint": "One-sentence key point to remember",
    "essential": true,
    "workedExample": "Show a concrete worked example for this step (HTML)"
  }
]

Rules:
- 6–10 slides. Start with setup/identify, work through all steps, end with check/verify.
- "essential": true for must-know steps, false for bonus/advanced steps.
- Use concrete numbers in workedExample (e.g. for circles: centre (3,-2) radius 5).
- ${gradeInstruction.replace(/\[ESSENTIAL: \.\.\.\]|\[BONUS: \.\.\.\]/g,'')}`
  };

  const sys = `You are Synaptiq AI, an expert UK ${levelLabel} ${board} Mathematics teacher.
Target grade: ${gradeCfg.label}.
${modeGuides[selectedMode]}
${selectedMode !== 'slides' && selectedMode !== 'quiz' ? `Format in HTML using: <h3>, <p>, <ul>, <ol>, <li>, <strong>, <em>, <code>.
Use [CALLOUT: text] for key points, [EXAMPLE: text] for examples, [WARNING: text] for common mistakes.
Use [ESSENTIAL: text] for must-know content, [BONUS: text] for advanced/extra content.
ALWAYS wrap mathematical expressions in LaTeX: use $...$ for inline math (e.g. $x^2 + y^2 = r^2$) and $$...$$ on its own line for display equations. Never write bare formulas without LaTeX delimiters.
Make it engaging, thorough, and exam-focused.` : selectedMode === 'slides' ? `ALWAYS use LaTeX in slide content: $...$ for inline math, $$...$$ for display equations. For example: "The equation of a circle is $x^2 + y^2 = r^2$" and for the general form: $$( x - a)^2 + (y - b)^2 = r^2$$` : ''}`;

  try {
    const data = await callClaude([{
      role: 'user',
      content: `Teach me "${topicFocus}" from ${subject} ${board} ${levelLabel}. Topic area: ${selectedTopic}. Target grade: ${selectedGrade}.`
    }], sys);
    let reply = getReply(data);

    if (selectedMode === 'quiz') {
      renderQuiz(reply, subject, topicFocus, levelLabel, board);
    } else if (selectedMode === 'slides') {
      renderSlides(reply, subject, topicFocus, levelLabel, board);
    } else {
      renderLesson(reply, subject, topicFocus, levelLabel, board);
    }
  } catch(e) {
    output.innerHTML = `<div style="background:var(--bg3);border-radius:12px;padding:1.5rem;color:var(--muted)">⚠️ ${e.message || 'Could not generate lesson. Please try again.'}</div>`;
  }
  btn.disabled = false;
  btn.textContent = '✦ Start Lesson';
}

// ─── Math rendering ────────────────────────────────────
function rerenderMath(el) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'\\(',right:'\\)',display:false},
          {left:'$',right:'$',display:false}
        ],
        throwOnError:false
      });
    } catch(e) {}
  }
}

// ─── Format helpers ────────────────────────────────────
function formatLessonHTML(text) {
  return text
    .replace(/\[CALLOUT: (.*?)\]/g, '<div class="callout">$1</div>')
    .replace(/\[EXAMPLE: ([\s\S]*?)\]/g, '<div class="example">$1</div>')
    .replace(/\[WARNING: (.*?)\]/g, '<div class="warning">$1</div>')
    .replace(/\[ESSENTIAL: ([\s\S]*?)\]/g, '<div class="essential-block"><span class="essential-tag">✦ Essential</span><div>$1</div></div>')
    .replace(/\[BONUS: ([\s\S]*?)\]/g, '<div class="bonus-block"><span class="bonus-tag">★ Bonus / Advanced</span><div>$1</div></div>');
}

function gradeClass() {
  return selectedGrade === 'A*' ? 'grade-astar' : selectedGrade === 'A' ? 'grade-a' : selectedGrade === 'B' ? 'grade-b' : 'grade-c';
}

// ─── Render: Standard Lesson ────────────────────────────
function renderLesson(text, subject, topic, level, board) {
  const output = document.getElementById('lesson-output');
  const modeLabels = {full:'Full Lesson',explain:'Explanation',examples:'Worked Examples',exam:'Exam Technique',revision:'Quick Revision'};
  output.innerHTML = `
    <div class="lesson-header">
      <div>
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem">
          <div class="lesson-title" style="margin-bottom:0">${subject}: ${topic}</div>
          <span class="grade-indicator ${gradeClass()}">${selectedGrade} Target</span>
        </div>
        <div class="lesson-meta">${level} · ${board} · ${modeLabels[selectedMode]||''}</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn-outline" onclick="window.print()">🖨️ Print</button>
        <button class="btn-outline" onclick="startLesson()">↻ Regenerate</button>
        <button class="btn-outline" onclick="document.getElementById('selector-card').scrollIntoView({behavior:'smooth'})">← Change Topic</button>
      </div>
    </div>
    <div style="background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;padding:.65rem 1rem;margin-bottom:1.25rem;font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:.5rem">
      <span style="color:var(--gold)">✦</span>
      <span>Content is <strong style="color:var(--white)">filtered for ${selectedGrade} grade</strong>.
      <span class="essential-tag" style="font-size:.65rem;padding:.15rem .4rem">✦ Essential</span> = must-know for your grade.
      ${selectedGrade === 'A*' || selectedGrade === 'A' ? '<span class="bonus-tag" style="font-size:.65rem;padding:.15rem .4rem">★ Bonus</span> = advanced/extra depth.' : ''}
      </span>
    </div>
    <div class="lesson-body">${formatLessonHTML(text)}</div>`;
  setTimeout(() => rerenderMath(output), 100);
}

// ─── Render: Step-by-Step Slides ───────────────────────
function renderSlides(rawText, subject, topic, level, board) {
  const output = document.getElementById('lesson-output');
  let slides = [];

  try {
    const clean = rawText.replace(/```json|```/g,'').trim();
    slides = JSON.parse(clean);
    if (!Array.isArray(slides) || slides.length === 0) throw new Error('empty');
  } catch(e) {
    // If JSON parse fails, fall back to lesson render
    renderLesson(rawText, subject, topic, level, board);
    return;
  }

  // Filter slides based on grade
  let filteredSlides = slides;
  if (selectedGrade === 'B' || selectedGrade === 'C') {
    filteredSlides = slides.filter(s => s.essential !== false);
  }
  if (filteredSlides.length === 0) filteredSlides = slides;

  slideData = filteredSlides;
  currentSlide = 0;
  visitedSlides = new Set([0]);

  const total = filteredSlides.length;
  const skipped = slides.length - filteredSlides.length;

  // Build slide HTML
  const slidesHTML = filteredSlides.map((s, i) => {
    const isEssential = s.essential !== false;
    const badge = isEssential
      ? `<span class="slide-essential-badge">✦ Essential for ${selectedGrade}</span>`
      : `<span class="slide-bonus-badge">★ Bonus / Advanced</span>`;
    const keyPt = s.keyPoint ? `<div class="slide-keypint">${sanitizeHTML(s.keyPoint)}</div>` : '';
    const worked = s.workedExample ? `<div class="example" style="margin-top:1rem"><strong>Worked example:</strong><br>${s.workedExample}</div>` : '';
    return `<div class="slide${i===0?' active':''}" id="slide-${i}">
      <div class="slide-card">
        <div class="slide-step-label">
          <div class="slide-step-num">${i+1}</div>
          <span>Step ${i+1} of ${total}</span>
          ${badge}
        </div>
        <div class="slide-title">${sanitizeHTML(s.title||'')}</div>
        <div class="slide-content">${formatLessonHTML(s.content||'')}${worked}</div>
        ${keyPt}
      </div>
    </div>`;
  }).join('');

  const dots = filteredSlides.map((_, i) =>
    `<div class="slide-dot${i===0?' active visited':''}" id="dot-${i}" onclick="goToSlide(${i})" title="Step ${i+1}"></div>`
  ).join('');

  const skippedNote = skipped > 0 ? `<div style="font-size:.75rem;color:var(--muted);text-align:center;margin-top:.75rem">⚡ ${skipped} advanced step${skipped>1?'s':''} hidden for ${selectedGrade} target — <a href="#" onclick="selectedGrade='A*';startLesson();return false" style="color:var(--gold);text-decoration:none">show all</a></div>` : '';

  output.innerHTML = `
    <div class="lesson-header">
      <div>
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem">
          <div class="lesson-title" style="margin-bottom:0">${subject}: ${topic}</div>
          <span class="grade-indicator ${gradeClass()}">${selectedGrade} Target</span>
        </div>
        <div class="lesson-meta">${level} · ${board} · Step-by-Step Slides · ${total} steps</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn-outline" onclick="window.print()">🖨️ Print All</button>
        <button class="btn-outline" onclick="startLesson()">↻ Regenerate</button>
        <button class="btn-outline" onclick="document.getElementById('selector-card').scrollIntoView({behavior:'smooth'})">← Change Topic</button>
      </div>
    </div>

    <div class="slide-deck">
      <div class="slide-track">${slidesHTML}</div>
      <div class="slide-nav">
        <button class="slide-nav-btn" id="prev-btn" onclick="navigateSlide(-1)" disabled>← Previous</button>
        <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem">
          <span class="slide-counter" id="slide-counter">Step 1 of ${total}</span>
          <div class="slide-progress-dots" id="progress-dots">${dots}</div>
        </div>
        <button class="slide-nav-btn" id="next-btn" onclick="navigateSlide(1)">Next →</button>
      </div>
    </div>
    ${skippedNote}`;
  setTimeout(() => rerenderMath(output), 100);
}

// ─── Slide Navigation ───────────────────────────────────
function navigateSlide(dir) {
  const total = slideData.length;
  const newIdx = currentSlide + dir;
  if (newIdx < 0 || newIdx >= total) return;
  goToSlide(newIdx);
}

function goToSlide(idx) {
  const total = slideData.length;
  // Hide current
  const cur = document.getElementById('slide-' + currentSlide);
  if (cur) cur.classList.remove('active');
  const curDot = document.getElementById('dot-' + currentSlide);
  if (curDot) { curDot.classList.remove('active'); curDot.classList.add('visited'); }

  currentSlide = idx;
  visitedSlides.add(idx);

  // Show new
  const next = document.getElementById('slide-' + idx);
  if (next) next.classList.add('active');
  const nextDot = document.getElementById('dot-' + idx);
  if (nextDot) { nextDot.classList.add('active','visited'); }

  // Update counter and nav buttons
  document.getElementById('slide-counter').textContent = `Step ${idx+1} of ${total}`;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === total - 1;
  if (idx === total - 1) {
    document.getElementById('next-btn').textContent = '✓ Complete';
  } else {
    document.getElementById('next-btn').textContent = 'Next →';
  }
  // Re-render math for this slide
  const activeSlide = document.getElementById('slide-' + idx);
  if (activeSlide) setTimeout(() => rerenderMath(activeSlide), 50);
}

// ─── Render: Quiz ───────────────────────────────────────
function renderQuiz(rawText, subject, topic, level, board) {
  const output = document.getElementById('lesson-output');
  let questions = [];
  try {
    const clean = rawText.replace(/```json|```/g,'').trim();
    questions = JSON.parse(clean);
  } catch(e) {
    renderLesson(rawText, subject, topic, level, board);
    return;
  }

  let html = `
    <div class="lesson-header">
      <div>
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem">
          <div class="lesson-title" style="margin-bottom:0">Quiz: ${subject} — ${topic}</div>
          <span class="grade-indicator ${gradeClass()}">${selectedGrade} Target</span>
        </div>
        <div class="lesson-meta">${level} · ${board} · ${questions.length} questions</div>
      </div>
      <button class="btn-outline" onclick="startLesson()">↻ New Quiz</button>
    </div>
    <div id="quiz-score" style="background:rgba(201,168,76,0.1);border-radius:12px;padding:1rem;margin-bottom:1.5rem;display:none">
      <strong>Score: <span id="score-val">0</span> / ${questions.length}</strong>
    </div>`;

  questions.forEach((q, i) => {
    html += `<div class="lesson-quiz" id="quiz-${i}">
      <div class="quiz-q">${i+1}. ${sanitizeHTML(q.question)}</div>
      <div class="quiz-options">${q.options.map((opt, j) =>
        `<button class="quiz-opt" onclick="checkAnswer(${i},${j},${q.correct},'${encodeURIComponent(q.explanation||'')}')">${sanitizeHTML(opt)}</button>`
      ).join('')}</div>
      <div class="quiz-feedback" id="qfb-${i}"></div>
    </div>`;
  });

  output.innerHTML = html;
  window._quizAnswered = new Array(questions.length).fill(false);
  window._quizScore = 0;
}

function checkAnswer(qIdx, chosenIdx, correctIdx, explanationEnc) {
  if (window._quizAnswered?.[qIdx]) return;
  if (window._quizAnswered) window._quizAnswered[qIdx] = true;
  const quizBlock = document.getElementById('quiz-' + qIdx);
  const opts = quizBlock.querySelectorAll('.quiz-opt');
  opts[correctIdx].classList.add('correct');
  if (chosenIdx !== correctIdx) opts[chosenIdx].classList.add('wrong');
  else { if (window._quizScore !== undefined) window._quizScore++; }
  opts.forEach(o => o.disabled = true);
  const fb = document.getElementById('qfb-' + qIdx);
  const explanation = decodeURIComponent(explanationEnc);
  fb.innerHTML = chosenIdx === correctIdx
    ? `<span style="color:var(--green)">✅ Correct!</span> ${sanitizeHTML(explanation)}`
    : `<span style="color:var(--pink)">❌ Incorrect.</span> ${sanitizeHTML(explanation)}`;
  fb.classList.add('show');
  const answered = (window._quizAnswered || []).filter(Boolean).length;
  const total = (window._quizAnswered || []).length;
  if (answered === total) {
    const scoreDiv = document.getElementById('quiz-score');
    if (scoreDiv) { scoreDiv.style.display = 'block'; document.getElementById('score-val').textContent = window._quizScore; }
  }
}

function sanitizeHTML(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initAuth();
</script>

</html>
