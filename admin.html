<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lumina AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--bg:#08090E;--bg2:#0D0F18;--bg3:#121520;--bg4:#181C2A;--white:#F0EEF8;--muted:#6B7394;--border:rgba(255,255,255,0.07);--green:#4ADE80;--blue:#60A5FA;--red:#FB7185;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}
  #login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:360px;text-align:center;}
  .login-card h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);margin-bottom:.5rem;}
  .login-card p{color:var(--muted);font-size:.875rem;margin-bottom:1.5rem;}
  input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;color:var(--white);font-family:'DM Sans',sans-serif;margin-bottom:1rem;}
  input:focus{outline:none;border-color:var(--gold);}
  .btn{width:100%;padding:.875rem;background:linear-gradient(135deg,var(--gold),#A07830);color:#0D0F18;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;}
  #dashboard{display:none;padding:2rem;max-width:1200px;margin:0 auto;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
  header h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
  .stat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;}
  .stat-val{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;margin-bottom:.25rem;}
  .stat-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
  .panel h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
  table{width:100%;border-collapse:collapse;font-size:.85rem;}
  th{text-align:left;padding:.6rem .75rem;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
  td{padding:.7rem .75rem;border-bottom:1px solid rgba(255,255,255,0.04);}
  .badge{display:inline-flex;padding:.2rem .6rem;border-radius:6px;font-size:.7rem;font-weight:700;}
  .badge-active{background:rgba(74,222,128,.15);color:var(--green);}
  .badge-free{background:rgba(107,115,148,.15);color:var(--muted);}
  .badge-cancelled,.badge-past_due{background:rgba(251,113,133,.15);color:var(--red);}
  .action-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.4rem .875rem;color:var(--white);cursor:pointer;font-size:.8rem;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .action-btn:hover{border-color:var(--gold);color:var(--gold);}
  .action-btn:disabled{opacity:.5;cursor:not-allowed;}
  .search{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.5rem .875rem;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.875rem;width:240px;}
  .search:focus{outline:none;border-color:var(--gold);}
  .pager{display:flex;align-items:center;gap:.75rem;margin-top:1rem;font-size:.85rem;color:var(--muted);}
  .pager button{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.3rem .75rem;color:var(--white);cursor:pointer;font-size:.8rem;}
  .pager button:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <h1>🔐 Lumina Admin</h1>
    <p>Enter your admin key to access the dashboard</p>
    <input type="password" id="admin-key" placeholder="Admin secret key" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn" onclick="adminLogin()">Access Dashboard</button>
    <div id="login-error" style="color:#FB7185;font-size:.85rem;margin-top:.75rem;display:none">Invalid key</div>
  </div>
</div>

<div id="dashboard">
  <header>
    <h1>✦ Lumina Admin</h1>
    <div style="display:flex;gap:.75rem;align-items:center">
      <span id="last-refresh" style="color:var(--muted);font-size:.8rem"></span>
      <button class="action-btn" onclick="loadDashboard()">↺ Refresh</button>
      <button class="action-btn" id="email-btn" onclick="sendWeeklyEmails()">📧 Send Weekly Emails</button>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat"><div class="stat-val" id="stat-total"  style="color:var(--gold)">—</div><div class="stat-label">Total Users</div></div>
    <div class="stat"><div class="stat-val" id="stat-active" style="color:var(--green)">—</div><div class="stat-label">Active (7d)</div></div>
    <div class="stat"><div class="stat-val" id="stat-paying" style="color:var(--blue)">—</div><div class="stat-label">Paying</div></div>
    <div class="stat"><div class="stat-val" id="stat-mrr"    style="color:var(--gold)">—</div><div class="stat-label">Real MRR</div></div>
  </div>

  <div class="panel">
    <h2>
      👥 All Users
      <input class="search" id="user-search" placeholder="Search name or email..." oninput="filterUsers()">
    </h2>
    <div style="overflow-x:auto">
      <table>
        <tr><th>Name</th><th>Email</th><th>Plan</th><th>Status</th><th>XP</th><th>Questions</th><th>Joined</th></tr>
        <tbody id="users-table"></tbody>
      </table>
    </div>
    <div class="pager">
      <button id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
      <span id="page-info">Page 1</span>
      <button id="next-btn" onclick="changePage(1)">Next →</button>
      <span id="total-info"></span>
    </div>
  </div>
</div>

<script>
let adminKey = '';
let allUsers = [];
let currentPage = 1;
let totalPages  = 1;

function adminLogin() {
  adminKey = document.getElementById('admin-key').value;
  if (!adminKey) return;
  loadDashboard();
}

async function fetchAdmin(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const r  = await fetch(`/api/admin?${qs}`, { headers: { 'x-admin-key': adminKey } });
  if (!r.ok) throw new Error('Unauthorized');
  return r.json();
}

async function loadDashboard() {
  try {
    const [stats] = await Promise.all([fetchAdmin('stats')]);
    document.getElementById('login').style.display     = 'none';
    document.getElementById('dashboard').style.display = 'block';

    document.getElementById('stat-total').textContent  = stats.total_users.toLocaleString();
    document.getElementById('stat-active').textContent = stats.active_7d.toLocaleString();
    document.getElementById('stat-paying').textContent = stats.paying.toLocaleString();
    document.getElementById('stat-mrr').textContent    = '£' + (stats.mrr || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB');

    await loadUsers(1);
  } catch (e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

async function loadUsers(page) {
  currentPage = page;
  const data  = await fetchAdmin('users', { page, limit: 50 });
  allUsers    = data.users || [];
  totalPages  = data.pages || 1;

  renderUsers(allUsers);
  document.getElementById('page-info').textContent  = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('total-info').textContent = `${data.total} total users`;
  document.getElementById('prev-btn').disabled      = currentPage <= 1;
  document.getElementById('next-btn').disabled      = currentPage >= totalPages;
}

async function changePage(delta) {
  await loadUsers(currentPage + delta);
}

function renderUsers(users) {
  const badgeClass = s => ({ active: 'badge-active', free: 'badge-free', cancelled: 'badge-cancelled', past_due: 'badge-past_due' }[s] || 'badge-free');
  document.getElementById('users-table').innerHTML = users.map(u => `
    <tr>
      <td style="font-weight:600">${esc(u.name || '—')}</td>
      <td style="color:var(--muted)">${esc(u.email || '')}</td>
      <td>${esc(u.plan || 'free')}</td>
      <td><span class="badge ${badgeClass(u.subscription_status)}">${esc(u.subscription_status || 'free')}</span></td>
      <td style="font-family:'DM Mono',monospace">${(u.xp || 0).toLocaleString()}</td>
      <td style="font-family:'DM Mono',monospace">${(u.questions_answered || 0).toLocaleString()}</td>
      <td style="color:var(--muted)">${u.created_at ? new Date(u.created_at).toLocaleDateString('en-GB') : '—'}</td>
    </tr>`).join('');
}

function filterUsers() {
  const q = document.getElementById('user-search').value.toLowerCase();
  renderUsers(allUsers.filter(u => (u.name || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q)));
}

async function sendWeeklyEmails() {
  if (!confirm('Send weekly progress emails to all active subscribers?')) return;
  const btn = document.getElementById('email-btn');
  btn.textContent = 'Sending…';
  btn.disabled = true;
  try {
    const data = await fetchAdmin('send_weekly_emails');
    const msg  = `✅ Sent: ${data.sent}${data.failed ? ` · Failed: ${data.failed}` : ''}`;
    alert(msg);
  } catch (e) {
    alert('Error sending emails — check the console.');
  } finally {
    btn.textContent = '📧 Send Weekly Emails';
    btn.disabled = false;
  }
}

/** Escape user-controlled strings before inserting into innerHTML */
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
